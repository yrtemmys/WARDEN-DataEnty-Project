<!DOCTYPE html>
<html>
	<head>
		<style>
			body{
				color: white;
				background-color: #003311;
				height: 100vh;
			}
			.flex_container{
				display:flex;
			}
			.flex_element{
				flex: 1;
				height: 100vh;
				overflow-y: scroll;
				height: 100vh;
			}
			.sidebar{
				flex: 0.7;
			}
			.sidebar_list{

			}
			.vertical_divider{
				flex: 0.01;
				border-left: 1px solid #ffffff;
			}
			.header{
			}
			.header *{
				flex:1;
			}
			.ability{
				background-color: #006644;	
				padding: 15px;
				margin: 5px;
				border-color: #668822;
				border-style: groove;
				border-width: 5px;
				border-radius: 5px;
			}
			.ability:hover{
				background-color: #117755;
			}
			.ability_title{
				font-size: x-large;	
				--line-height: 1;
				font-weight: bold;
				--margin-bottom: -10px;
			}
			.feat{
			
			}
			.feat_title{	
				font-size: large;
				font-weight: bold;	
				--line-height: 0.1;
				--margin-top: 20px;
				--margin-bottom: -10px;
			}
			.hidden{
				display:none;
			}
			.popup{
				position:absolute;
				z-index: 1;
			}
			.options{
				background-color: #001105;
				width: 90%;
				height: 90%;
				left: 4%;
				top: 4%;
				border-radius: 2%;
				border-style: solid;
				border-width: 5px;
				border-color: #668822;
				padding: 1%;
			}
			.grid{
				display:grid;
				grid-template-columns: auto auto auto;
			}
		</style>
	</head>
	<body>
		<div class='popup options hidden' id='controls'>
			<h1>Controls</h1>
			<input type="button" id="get_character" value="laod char">
			<input type="button" id="save_character" value="save char">
			<input type='text' id='character_id' value='1'/>
			<input type='button' id='new_character' value='New Character'/>
			<input type='button' id='export_character' value='Export Character'/>
			<input type='file' id='import_character' value='Import Character'/>
			<input type='button' class='toggle_popup' value='Controls'/>
			<div class='character_list'></div>
		</div>
		<div class="flex_container header">
			<h1>real warden site</h1>
			<input type='text'   id="character_name" class='updater' value='John Smith'/>
			<input type='number' id="character_level" class='updater' value='0'/>
			<input type='number' id="character_advance_points" class='updater' value=0/>
			<input type='button' class='toggle_popup' value='Controls'/>
		</div>
		<div class="flex_container">
			<div class="flex_element sidebar">
				<input type="button", id="button1", value="hello">
				<br>
				<label>Title</label><input type="text", id="i_title", value=''>
				<br>
				<label>Alterations: </label><select id="s_alteration"></select>
				<br>
				<label>Paths: </label><select id="s_path"></select>
				<hr>
				<div id="sidebar_list">ya</div>
			</div>
			<div class="flex_element vertical_divider"></div>
			<div class="flex_element" id="detail_view">
				<h3>Saved</h3>
				<div class='grid'>
					<div id='char_meta'></div>
					<div id='char_origins'></div>
				</div>
				<hr>
				<div class='grid'>
					<div id='char_resources'></div>
					<div id='char_skills'></div>
				</div>
				<hr>
				<div class="grid" id='char_ranks'></div>
				<hr>
				<div id='char_abilities'></div>
			</div>
		</div>
		<script src='./index.js'></script>
	</body>
</html>
